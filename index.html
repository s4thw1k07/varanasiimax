        /* CSS Liquid Glass & Animation Framework */
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: 1px solid rgba(255, 255, 255, 0.2);
            --accent: #d4af37;
            --fluid: cubic-bezier(0.25, 1, 0.5, 1);
        }

        body { background: #000; color: #fff; margin: 0; padding: 20px; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; }

        .glass-ui {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--border);
            border-radius: 20px;
            padding: 2rem;
            transition: transform 0.4s var(--fluid);
        }
